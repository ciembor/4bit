<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="author" content="Maciej Ciemborowicz" />
		<title>4bit. Terminal Color Scheme Designer</title>
		<meta name="description" content="This application
		allows you to create custom theme for a Linux terminal
		and export it to the .Xresources / .Xdefaults
		configuration file (xterm, aterm, eterm, rxvt, urxvt),
		*.colorscheme (konsole, yakuake) and *.itermcolors
		(iTerm2 for Mac)"/>
		<link rel="icon" type="image/svg+xml" href="images/favicon.svg">
		<style id="outline-fix"></style>
	</head>
	<body id="app" onmousedown="document.getElementById('outline-fix').innerHTML='a{outline:none}';" onkeydown="document.getElementById('outline-fix').innerHTML=''">
        <script type="module" src="/src/main.js"></script>
	</body>
</html>
